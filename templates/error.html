{% extends 'layout.html' %}

{% block title %}Error {{ error_code }} | CreditShield AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 text-center py-5">
        <div class="glass-card">
            <div class="mb-4">
                <i class="fas fa-triangle-exclamation fa-5x text-warning animate-pulse" style="filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.4));"></i>
            </div>
            <h1 class="display-3 fw-bold font-monospace text-warning">{{ error_code }}</h1>
            <h3 class="mb-3" style="font-family: 'Outfit', sans-serif;">System Notice</h3>
            <p class="text-secondary mb-5">
                {{ error_message }}
            </p>
            <div class="d-flex gap-3 justify-content-center">
                <a href="{{ url_for('home') }}" class="btn btn-glow">
                    <i class="fas fa-house me-2"></i>Return Home
                </a>
                <a href="{{ url_for('predict_form') }}" class="btn btn-outline-light rounded-pill px-4" style="border: 1px solid var(--card-border);">
                    <i class="fas fa-rotate-left me-2"></i>Try Predictor
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
